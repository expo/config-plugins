name: Test Packages
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["20", "22"]
    name: Build with Node ${{ matrix.node }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: pnpm/action-setup@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter './packages/*' --parallel run prepare
      - uses: actions/cache@v4
        with:
          path: "*"
          key: v2-${{ github.sha }}-${{ matrix.node }}
  test:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
        package: [
            # Manually add packages here
            ios-stickers,
            react-native-blob-util,
            react-native-branch,
            react-native-siri-shortcut,
            react-native-pdf,
          ]
    name: Test ${{ matrix.package }} on Node ${{ matrix.node }}
    steps:
      - uses: actions/cache@v4
        with:
          path: "*"
          key: v2-${{ github.sha }}-${{ matrix.node }}
      - uses: pnpm/action-setup@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - name: Lint ${{ matrix.package }}
        run: pnpm lint --max-warnings 0
        working-directory: packages/${{ matrix.package }}
      - name: Test ${{ matrix.package }}
        run: pnpm test
        working-directory: packages/${{ matrix.package }}
        env:
          CI: true
          EXPO_DEBUG: true
